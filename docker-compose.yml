services:
  db:
    image: postgres:15
    container_name: erp-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - erp-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: erp-redis
    networks:
      - erp-network
    restart: unless-stopped

  odoo:
    image: odoo:17.0
    container_name: erp-odoo
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8069:8069"
    environment:
      HOST: db
      USER: ${POSTGRES_USER}
      PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
    volumes:
      - odoo_data:/var/lib/odoo
      - ./config:/etc/odoo
      - ./addons:/mnt/extra-addons
    networks:
      - erp-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: erp-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - odoo
      - whatsapp-service
    networks:
      - erp-network
    restart: unless-stopped

  whatsapp-service:
    build:
      context: ./services/whatsapp
      dockerfile: Dockerfile
    container_name: erp-whatsapp
    environment:
      ODOO_URL: http://odoo:8069
      ODOO_DB: ${POSTGRES_DB}
      ODOO_USERNAME: ${ODOO_ADMIN_USER}
      ODOO_PASSWORD: ${ODOO_ADMIN_PASSWORD}
      REDIS_URL: redis://redis:6379
      WA_SESSION_PATH: /app/sessions
    volumes:
      - whatsapp_sessions:/app/sessions
    depends_on:
      - odoo
      - redis
    networks:
      - erp-network
    restart: unless-stopped

  telegram-service:
    build:
      context: ./services/telegram
      dockerfile: Dockerfile
    container_name: erp-telegram
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      ODOO_URL: http://odoo:8069
      ODOO_DB: ${POSTGRES_DB}
      ODOO_USERNAME: ${ODOO_ADMIN_USER}
      ODOO_PASSWORD: ${ODOO_ADMIN_PASSWORD}
      REDIS_URL: redis://redis:6379
    depends_on:
      - odoo
      - redis
    networks:
      - erp-network
    restart: unless-stopped

  celery-worker:
    build:
      context: ./services/celery
      dockerfile: Dockerfile
    container_name: erp-celery
    environment:
      REDIS_URL: redis://redis:6379
      ODOO_URL: http://odoo:8069
      ODOO_DB: ${POSTGRES_DB}
    depends_on:
      - redis
      - odoo
    networks:
      - erp-network
    restart: unless-stopped

volumes:
  postgres_data:
  odoo_data:
  whatsapp_sessions:

networks:
  erp-network:
    driver: bridge
